<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Writing Room</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FAFAF7;
  --bg-card: #FFFFFF;
  --text: #2C2C2C;
  --text-sub: #6B6B6B;
  --text-light: #999;
  --accent: #B8544F;
  --accent-light: #F0E0DF;
  --border: #E8E6E1;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
  --radius: 6px;
  --font-body: 'Noto Serif JP', 'Georgia', serif;
  --font-title: 'Shippori Mincho', serif;
  --font-ui: 'Inter', sans-serif;
  --max-w: 820px;
  --side-w: 240px;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.9;
  font-size: 15.5px;
  min-height: 100vh;
}

/* ── Header ── */
.site-header {
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.site-title {
  font-family: var(--font-title);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
  letter-spacing: 0.02em;
  cursor: pointer;
}
.site-title:hover { color: var(--accent); }
.header-nav {
  display: flex;
  gap: 6px;
  font-family: var(--font-ui);
  font-size: 13px;
}
.header-nav button {
  background: none;
  border: 1px solid transparent;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  color: var(--text-sub);
  font-family: var(--font-ui);
  font-size: 13px;
  transition: all 0.2s;
}
.header-nav button:hover,
.header-nav button.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

/* ── Layout ── */
.page-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px;
  display: flex;
  gap: 48px;
}
.main-col { flex: 1; min-width: 0; }
.side-col {
  width: var(--side-w);
  flex-shrink: 0;
}

/* ── Sidebar ── */
.side-section { margin-bottom: 32px; }
.side-title {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-light);
  margin-bottom: 12px;
}
.cat-list { list-style: none; }
.cat-list li { margin-bottom: 2px; }
.cat-list button {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 6px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 13.5px;
  color: var(--text-sub);
  transition: all 0.15s;
}
.cat-list button:hover { background: var(--accent-light); color: var(--accent); }
.cat-list button.active { background: var(--accent); color: #fff; }
.cat-list .sub-cat { padding-left: 24px; font-size: 12.5px; }
.cat-count {
  float: right;
  font-size: 11px;
  color: var(--text-light);
  margin-top: 2px;
}

/* ── Article List ── */
.list-header {
  font-family: var(--font-title);
  font-size: 20px;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--text);
}
.article-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.article-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow);
  transform: translateY(-1px);
}
.card-meta {
  font-family: var(--font-ui);
  font-size: 11.5px;
  color: var(--text-light);
  margin-bottom: 6px;
  display: flex;
  gap: 12px;
  align-items: center;
}
.card-cat {
  background: var(--accent-light);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 3px;
  font-weight: 500;
}
.card-title {
  font-family: var(--font-title);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
  line-height: 1.5;
}
.card-excerpt {
  font-size: 13.5px;
  color: var(--text-sub);
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── Article View ── */
.article-view { display: none; }
.article-view.show { display: block; }
.back-btn {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--text-sub);
  background: none;
  border: none;
  cursor: pointer;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.back-btn:hover { color: var(--accent); }
.article-header {
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.article-header .card-meta { margin-bottom: 12px; }
.article-header h1 {
  font-family: var(--font-title);
  font-size: 28px;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 8px;
}
.article-body {
  max-width: var(--max-w);
  font-size: 15.5px;
  line-height: 2;
}
.article-body h2 {
  font-family: var(--font-title);
  font-size: 21px;
  margin: 40px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.article-body h3 {
  font-size: 17px;
  margin: 28px 0 12px;
}
.article-body p { margin-bottom: 18px; }
.article-body img {
  max-width: 100%;
  border-radius: var(--radius);
  margin: 20px 0;
  box-shadow: var(--shadow);
}
.article-body blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 20px;
  margin: 20px 0;
  color: var(--text-sub);
  background: rgba(0,0,0,0.015);
  border-radius: 0 var(--radius) var(--radius) 0;
}
.article-body code {
  background: #f0eeea;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 14px;
}
.article-body pre {
  background: #2C2C2C;
  color: #e8e6e1;
  padding: 16px 20px;
  border-radius: var(--radius);
  overflow-x: auto;
  margin: 20px 0;
}
.article-body pre code {
  background: none;
  padding: 0;
  color: inherit;
}
.article-body hr {
  border: none;
  text-align: center;
  margin: 32px 0;
}
.article-body hr::before {
  content: '＊　＊　＊';
  color: var(--text-light);
  font-size: 13px;
  letter-spacing: 0.3em;
}

/* ── Empty / Loading ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
  font-family: var(--font-ui);
}
.empty-state .icon { font-size: 40px; margin-bottom: 16px; }
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-light);
  font-family: var(--font-ui);
  font-size: 13px;
}

/* ── Footer ── */
.site-footer {
  border-top: 1px solid var(--border);
  text-align: center;
  padding: 24px;
  margin-top: 60px;
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--text-light);
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .page-wrap { flex-direction: column-reverse; gap: 24px; padding: 20px 16px; }
  .side-col { width: 100%; }
  .side-col .cat-tree { display: flex; flex-wrap: wrap; gap: 6px; }
  .side-col .cat-tree .cat-list { display: contents; }
  .side-col .cat-tree .cat-list li { margin: 0; }
  .side-col .cat-tree .cat-list button { padding: 5px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 20px; }
  .side-col .cat-tree .cat-list .sub-cat { padding-left: 12px; }
  .side-col .side-title { display: none; }
  .cat-count { display: none; }
  .article-header h1 { font-size: 22px; }
  .header-nav { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="header-inner">
    <a class="site-title" onclick="showList()">My Writing Room</a>
    <nav class="header-nav" id="mainNav"></nav>
  </div>
</header>

<!-- Main -->
<div class="page-wrap">
  <!-- Sidebar -->
  <aside class="side-col">
    <div class="side-section">
      <div class="side-title">カテゴリ</div>
      <div class="cat-tree" id="catTree"></div>
    </div>
  </aside>

  <!-- Content -->
  <div class="main-col">
    <!-- Article List -->
    <div id="listView">
      <div class="list-header" id="listTitle">すべての記事</div>
      <div id="articleList"></div>
    </div>

    <!-- Article Detail -->
    <div class="article-view" id="articleView">
      <button class="back-btn" onclick="showList()">← 記事一覧にもどる</button>
      <div class="article-header" id="articleHeader"></div>
      <div class="article-body" id="articleBody"></div>
    </div>
  </div>
</div>

<footer class="site-footer">© My Writing Room</footer>

<script>
// ─── CONFIG ───────────────────────────────────────
// サイト名を変えたい場合はここを編集
const SITE_NAME = 'My Writing Room';

// 大カテゴリの表示名（articles.json の category に対応）
const CATEGORY_LABELS = {
  'novel':  '小説',
  'blog':   'ブログ',
};

// 小カテゴリの表示名（articles.json の subcategory に対応）
const SUBCATEGORY_LABELS = {
  'fantasy': 'ファンタジー',
  'sf':      'SF',
  'daily':   '日常',
  'tech':    '技術メモ',
};

// ─── STATE ────────────────────────────────────────
let articles = [];
let currentFilter = null; // null = all, { cat } or { cat, sub }

// ─── INIT ─────────────────────────────────────────
document.querySelector('.site-title').textContent = SITE_NAME;
document.title = SITE_NAME;
document.querySelector('.site-footer').innerHTML = `© ${SITE_NAME}`;

async function init() {
  document.getElementById('articleList').innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const res = await fetch('articles.json');
    articles = await res.json();
    articles.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  } catch (e) {
    document.getElementById('articleList').innerHTML =
      '<div class="empty-state"><div class="icon">📄</div>articles.json が見つかりません。<br>README を参照してセットアップしてください。</div>';
    return;
  }
  buildNav();
  buildCategoryTree();
  handleHash();
  window.addEventListener('hashchange', handleHash);
}

// ─── NAVIGATION ───────────────────────────────────
function buildNav() {
  const nav = document.getElementById('mainNav');
  const btn = (label, fn) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.onclick = fn;
    return b;
  };
  nav.appendChild(btn('すべて', () => { currentFilter = null; showList(); }));
  const cats = [...new Set(articles.map(a => a.category))];
  cats.forEach(c => {
    nav.appendChild(btn(CATEGORY_LABELS[c] || c, () => {
      currentFilter = { cat: c };
      showList();
    }));
  });
}

function buildCategoryTree() {
  const tree = document.getElementById('catTree');
  tree.innerHTML = '';

  // "すべて" button
  const allUl = document.createElement('ul');
  allUl.className = 'cat-list';
  const allLi = document.createElement('li');
  const allBtn = document.createElement('button');
  allBtn.textContent = 'すべて';
  const allCount = document.createElement('span');
  allCount.className = 'cat-count';
  allCount.textContent = articles.length;
  allBtn.appendChild(allCount);
  allBtn.onclick = () => { currentFilter = null; showList(); };
  allLi.appendChild(allBtn);
  allUl.appendChild(allLi);
  tree.appendChild(allUl);

  // Group by category
  const catMap = {};
  articles.forEach(a => {
    if (!catMap[a.category]) catMap[a.category] = {};
    const sub = a.subcategory || '_none';
    if (!catMap[a.category][sub]) catMap[a.category][sub] = 0;
    catMap[a.category][sub]++;
  });

  Object.keys(catMap).forEach(cat => {
    const ul = document.createElement('ul');
    ul.className = 'cat-list';

    // Main cat
    const li = document.createElement('li');
    const btn = document.createElement('button');
    const total = Object.values(catMap[cat]).reduce((s, n) => s + n, 0);
    btn.innerHTML = `${CATEGORY_LABELS[cat] || cat}<span class="cat-count">${total}</span>`;
    btn.onclick = () => { currentFilter = { cat }; showList(); };
    li.appendChild(btn);
    ul.appendChild(li);

    // Sub cats
    Object.keys(catMap[cat]).forEach(sub => {
      if (sub === '_none') return;
      const sli = document.createElement('li');
      const sbtn = document.createElement('button');
      sbtn.className = 'sub-cat';
      sbtn.innerHTML = `${SUBCATEGORY_LABELS[sub] || sub}<span class="cat-count">${catMap[cat][sub]}</span>`;
      sbtn.onclick = () => { currentFilter = { cat, sub }; showList(); };
      sli.appendChild(sbtn);
      ul.appendChild(sli);
    });

    tree.appendChild(ul);
  });
}

// ─── LIST VIEW ────────────────────────────────────
function showList() {
  location.hash = '';
  document.getElementById('listView').style.display = '';
  document.getElementById('articleView').className = 'article-view';

  const filtered = articles.filter(a => {
    if (!currentFilter) return true;
    if (currentFilter.sub) return a.category === currentFilter.cat && a.subcategory === currentFilter.sub;
    return a.category === currentFilter.cat;
  });

  // Title
  let title = 'すべての記事';
  if (currentFilter) {
    title = CATEGORY_LABELS[currentFilter.cat] || currentFilter.cat;
    if (currentFilter.sub) title += ' / ' + (SUBCATEGORY_LABELS[currentFilter.sub] || currentFilter.sub);
  }
  document.getElementById('listTitle').textContent = title;

  // Active state in sidebar
  document.querySelectorAll('.cat-list button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.header-nav button').forEach(b => b.classList.remove('active'));

  // Render cards
  const container = document.getElementById('articleList');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📝</div>まだ記事がありません</div>';
    return;
  }
  container.innerHTML = filtered.map(a => `
    <div class="article-card" onclick="showArticle('${a.file}')">
      <div class="card-meta">
        <span class="card-cat">${CATEGORY_LABELS[a.category] || a.category}${a.subcategory ? ' / ' + (SUBCATEGORY_LABELS[a.subcategory] || a.subcategory) : ''}</span>
        <span>${a.date || ''}</span>
      </div>
      <div class="card-title">${a.title}</div>
      ${a.excerpt ? `<div class="card-excerpt">${a.excerpt}</div>` : ''}
    </div>
  `).join('');
  window.scrollTo(0, 0);
}

// ─── ARTICLE VIEW ─────────────────────────────────
async function showArticle(file) {
  location.hash = file;
  document.getElementById('listView').style.display = 'none';
  const view = document.getElementById('articleView');
  view.className = 'article-view show';

  const article = articles.find(a => a.file === file);
  if (!article) return;

  document.getElementById('articleHeader').innerHTML = `
    <div class="card-meta">
      <span class="card-cat">${CATEGORY_LABELS[article.category] || article.category}${article.subcategory ? ' / ' + (SUBCATEGORY_LABELS[article.subcategory] || article.subcategory) : ''}</span>
      <span>${article.date || ''}</span>
    </div>
    <h1>${article.title}</h1>
  `;

  document.getElementById('articleBody').innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const res = await fetch(file);
    const md = await res.text();
    document.getElementById('articleBody').innerHTML = marked.parse(md);
  } catch (e) {
    document.getElementById('articleBody').innerHTML = '<div class="empty-state">記事の読み込みに失敗しました。<br>ファイルパスを確認してください。</div>';
  }
  window.scrollTo(0, 0);
}

// ─── HASH ROUTING ─────────────────────────────────
function handleHash() {
  const hash = location.hash.slice(1);
  if (hash && hash.endsWith('.md')) {
    showArticle(decodeURIComponent(hash));
  } else {
    showList();
  }
}

// ─── START ────────────────────────────────────────
init();
</script>
</body>
</html>
